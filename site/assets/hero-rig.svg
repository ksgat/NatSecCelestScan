<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Kestrel hero placeholder</title>
  <desc id="desc">Abstract placeholder for the Kestrel unit hero image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f3eb"/>
      <stop offset="1" stop-color="#ece8dc"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#195a74"/>
      <stop offset="1" stop-color="#ca6e2d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="170" cy="160" r="150" fill="#195a74" opacity="0.08"/>
  <circle cx="1010" cy="160" r="180" fill="#ca6e2d" opacity="0.09"/>
  <rect x="140" y="150" width="920" height="560" fill="#fffdf8" stroke="#d8d4c8" stroke-width="4"/>
  <g transform="translate(220 250)">
