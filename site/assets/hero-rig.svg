  <text x="140" y="790" fill="#18211e" font-family="Space Grotesk, sans-serif" font-size="56" font-weight="700">Rig photo placeholder</text>
  <text x="140" y="835" fill="#5f6964" font-family="IBM Plex Mono, monospace" font-size="24">Replace with a real unit photo, field capture, or polished render.</text>
