    <rect x="52" y="50" width="456" height="150" fill="url(#panel)" opacity="0.12" stroke="#cfc8b8" stroke-width="3"/>
    <rect x="118" y="72" width="322" height="106" fill="#18211e" opacity="0.9"/>
    <circle cx="74" cy="74" r="34" fill="#195a74"/>
    <circle cx="486" cy="74" r="34" fill="#ca6e2d"/>
    <rect x="176" y="214" width="204" height="24" fill="#d5d0c2"/>
  </g>
  <g transform="translate(735 230)">
